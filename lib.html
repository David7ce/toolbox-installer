<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('theme-preference') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <title>Library Installer</title>
    <link rel="stylesheet" href="./css/base-styles.css">
    <link rel="stylesheet" href="./css/generator.css">
    <link rel="stylesheet" href="./css/lib-installer.css">
    <script type="module" src="./js/modules/theme-manager.js"></script>
    <script type="module" src="./js/modules/lib-installer.js"></script>
</head>

<body>
    <div class="page-wrapper">
        <header class="page-header">
            <h1>Library Installer</h1>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode"
                title="Dark mode">🌙</button>
        </header>

        <nav class="page-nav" aria-label="Page links">
            <div class="info-link">
                <a href="./index.html" title="Back to home page">⬅ Back to Home</a>
            </div>
            <div class="info-link">
                <a href="./lib-compatibility.html" title="Go to library compatibility table">📊 Library Compatibility Table</a>
            </div>
        </nav>

        <section class="package-section">
            <div class="container">
                <div class="os-selector-container">
                    <!-- Language selector buttons — rendered by JS -->
                    <div class="primary-os-selector" id="langSelector" role="group" aria-label="Select programming language"></div>

                    <!-- Build tool selector — shown only for Java -->
                    <div class="secondary-os-selector" id="javaToolSelector" style="display:none;"
                        role="group" aria-label="Select Java build tool">
                        <button type="button" class="distro-btn active" data-tool="maven">Maven (pom.xml)</button>
                        <button type="button" class="distro-btn" data-tool="gradle">Gradle (build.gradle)</button>
                    </div>
                </div>

                <div class="page-controls">
                    <div class="page-controls-panel main-controls">
                        <input id="searchInput" class="search-input" type="search" placeholder="Search libraries by name">
                        <label class="select-all-control">
                            <input type="checkbox" id="selectAllCheckbox" class="select-all-checkbox">
                            <span id="selectAllLabel">Select</span>
                        </label>
                        <button type="button" class="toggle-all-btn" id="toggleAllBtn" title="Collapse/Expand all categories">
                            <span id="toggleAllIcon">▼</span>
                            <span id="toggleAllLabel">Collapse</span>
                        </button>
                        <select id="optionsSelect" class="options-select">
                            <option value="" hidden selected>⚙️ Options</option>
                            <option value="exportPackages">📤 Export Libraries (JSON)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Library category cards — rendered by JS -->
            <div id="libContainer" class="package-container columns" role="list" aria-label="Library categories"></div>
        </section>
    </div>
</body>

</html>
