<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('theme-preference') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <title>Desktop Installer</title>
    <link rel="stylesheet" href="./css/base-styles.css">
    <link rel="stylesheet" href="./css/generator.css">
    <script type="module" src="./js/modules/theme-manager.js"></script>
    <script type="module" src="./js/modules/app.js"></script>
</head>

<body>
    <div class="page-wrapper">
        <header class="page-header">
            <h1>Desktop Installer</h1>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode"
                title="Dark mode">
                🌙
            </button>
        </header>

        <nav class="page-nav" aria-label="Page links">
            <div class="info-link">
                <a href="./index.html" title="Back to home page">⬅ Back to Home</a>
            </div>
            <div class="info-link">
                <a href="./desktop-os-compatibility.html" title="Go to desktop packages table">📊 Go Desktop Packages Table</a>
            </div>
        </nav>
        <!--
        <section class="intro-section">
            <h2>How to install packages</h2>
            <p>Every major Operating System has a <a href="https://en.wikipedia.org/wiki/Package_manager">package manager</a>
                that handles software installation and dependency resolution. Here you can select the list of your favorite
                packages to install and generate the command installation. It is compatible with all major desktop OS
                (Windows, macOS, Linux and freeBSD) and for Linux supports all the basic distributions.
            </p>
            <p>
                Here is a list of package availability across different Operating Systems:
                <a href="desktop-os-compatibility.html">Package OS Compatibility</a>
            </p>
        </section>
    -->

        <section class="package-section">
            <!-- <h2>Select the packages to install:</h2> -->
            <form id="packageForm">
                <div class="container">
                    <div class="os-selector-container">
                        <div class="primary-os-selector">
                            <button type="button" class="os-btn active" data-os="windows">🪟 Windows</button>
                            <button type="button" class="os-btn" data-os="macos">🍎 macOS</button>
                            <button type="button" class="os-btn" data-os="linux">🐧 Linux</button>
                            <button type="button" class="os-btn" data-os="freebsd">🔥 FreeBSD</button>
                        </div>

                        <div class="secondary-os-selector hidden" id="linuxDistroSelector">
                            <button type="button" class="distro-btn active" data-distro="linux_arch_pacman">Arch
                                (pm+yay)</button>
                            <button type="button" class="distro-btn" data-distro="linux_debian_apt">Debian
                                (apt)</button>
                            <button type="button" class="distro-btn" data-distro="linux_fedora_rpm">Fedora
                                (rpm)</button>
                            <button type="button" class="distro-btn" data-distro="linux_gentoo_emerge">Gentoo
                                (emerge)</button>
                            <button type="button" class="distro-btn" data-distro="linux_flatpak">Linux
                                (flatpak)</button>
                            <button type="button" class="distro-btn" data-distro="unix_nix_env">Linux (nix)</button>
                            <button type="button" class="distro-btn" data-distro="linux_snap">Linux (snap)</button>
                        </div>

                    </div>

                    <div class="page-controls">
                        <div class="page-controls-panel main-controls">
                            <input id="searchInput" class="search-input" type="search" placeholder="Search packages by name">
                            <label class="select-all-control">
                                <input type="checkbox" id="selectAllCheckbox" class="select-all-checkbox">
                                <span id="selectAllLabel">Select</span>
                            </label>
                            <button type="button" class="toggle-all-btn" id="toggleAllBtn"
                                title="Collapse/Expand all categories">
                                <span id="toggleAllIcon">▼</span>
                                <span id="toggleAllLabel">Collapse</span>
                            </button>
                            <button type="button" class="foss-toggle-btn" id="fossToggleBtn"
                                title="Show only Free and Open Source Software">
                                🌿 FOSS
                            </button>
                            <select id="optionsSelect" class="options-select">
                                <option value="" hidden selected>⚙️ Options</option>
                                <option value="loadFavorites">✨ My Favorites</option>
                                <option value="importPackages">📥 Import Packages (JSON)</option>
                                <option value="exportPackages">📤 Export Packages (JSON)</option>
                            </select>
                        </div>
                        <input type="file" id="fileInput" accept=".json" style="display: none;">
                    </div>

                </div>

                <div id="packageContainer" class="package-container columns">
                    <!-- Loading spinner -->
                    <div class="loading-spinner" id="loadingSpinner">
                        <div class="spinner"></div>
                        <p>Loading packages...</p>
                    </div>
                    <!-- Generated content -->
                </div>
            </form>
        </section>
    </div>
</body>

</html>
