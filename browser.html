<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('theme-preference') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <title>Browser Extensions Installer</title>
    <link rel="stylesheet" href="./css/base-styles.css">
    <link rel="stylesheet" href="./css/generator.css">
    <script type="module" src="./js/modules/theme-manager.js"></script>
    <script type="module" src="./js/modules/packages-table.js"></script>
</head>

<body>
    <div class="page-wrapper">
        <header class="page-header">
            <h1>Browser Extensions Installer</h1>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode" title="Dark mode">🌙</button>
        </header>

        <nav class="page-nav" aria-label="Page links">
            <div class="info-link">
                <a href="./index.html" title="Back to home page">⬅ Back to Home</a>
            </div>
            <div class="info-link">
                <a href="./browser-extensions-compatibility.html" title="Go to browser extensions table">📊 Go Browser Extensions Table</a>
            </div>
        </nav>

        <section class="package-section">
            <div class="container">
                <div class="page-controls">
                    <div class="page-controls-panel">
                        <input id="searchInput" class="search-input" type="search" placeholder="Search by extension name">
                    </div>
                    <div class="page-controls-panel main-controls">
                        <label class="select-all-control">
                            <input type="checkbox" id="selectAllCheckbox" class="select-all-checkbox">
                            <span id="selectAllLabel">Select</span>
                        </label>
                        <button type="button" class="toggle-all-btn" id="toggleAllBtn" title="Collapse/Expand all categories">
                            <span id="toggleAllIcon">▼</span>
                            <span id="toggleAllLabel">Collapse</span>
                        </button>
                        <select id="browserSelect" class="options-select">
                            <option value="both">🌐 Both browsers</option>
                            <option value="firefox">🦊 Firefox</option>
                            <option value="chromium">🔵 Chromium</option>
                        </select>
                        <select id="optionsSelect" class="options-select">
                            <option value="" hidden selected>⚙️ Options</option>
                            <option value="exportPackages">📤 Export Extensions (JSON)</option>
                        </select>
                    </div>
                    <input type="file" id="fileInput" accept=".json" style="display: none;">
                </div>
            </div>

            <div id="browserExtensionsCategories" class="package-container columns"></div>
        </section>
    </div>
</body>

</html>
