<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('theme-preference') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <title>Mobile Packages Compatibility</title>
    <link rel="stylesheet" href="./css/base-styles.css">
    <link rel="stylesheet" href="./css/os-compatibility.css">
    <script type="module" src="./js/modules/theme-manager.js"></script>
</head>

<body>
    <div class="container">
        <header class="page-header">
            <h1>📱 Mobile Packages Compatibility</h1>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode" title="Dark mode">
                🌙
            </button>
        </header>

        <p class="subtitle">Complete package names and official store links for Android and iOS.</p>

        <div class="info-link">
            <a href="index.html" class="back-link" title="Back to package selector">⬅ Back to Installer</a>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search package name...">
            </div>
        </div>

        <div class="table-container">
            <table id="packagesTable">
                <thead>
                    <tr>
                        <th>Package</th>
                        <th>Android Package Name</th>
                        <th>iOS Package Name</th>
                        <th>Android URL</th>
                        <th>iOS URL</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Generated rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { loadPackagesTable } from './js/modules/packages-table.js';
        document.addEventListener('DOMContentLoaded', loadPackagesTable);
    </script>
</body>

</html>
