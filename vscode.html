<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('theme-preference') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <title>VS Code Extensions - Command Generator</title>
    <link rel="stylesheet" href="./css/base-styles.css">
    <link rel="stylesheet" href="./css/generator.css">
    <script type="module" src="./js/modules/theme-manager.js"></script>
    <script type="module" src="./js/modules/packages-table.js"></script>
</head>

<body>
    <div class="page-wrapper">
        <header class="page-header">
            <h1>VS Code Extension Command Generator</h1>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode" title="Dark mode">🌙</button>
        </header>

        <div class="info-link">
            <a href="./index.html" class="back-link" title="Back to home page">⬅ Back to Home</a>
        </div>

        <div class="info-link">
            <a href="./vscode-extensions-compatibility.html" title="View installed extension list as table">📊 VS Code Extensions Table</a>
        </div>

        <section class="package-section">
            <div class="container">
                <div class="package-actions">
                    <div class="main-controls">
                        <label class="select-all-control">
                            <input type="checkbox" id="selectAllCheckbox" class="select-all-checkbox">
                            <span id="selectAllLabel">Select</span>
                        </label>
                        <button type="button" class="toggle-all-btn" id="toggleAllBtn" title="Collapse/Expand all categories">
                            <span id="toggleAllIcon">▼</span>
                            <span id="toggleAllLabel">Collapse</span>
                        </button>
                        <button type="button" class="foss-toggle-btn" id="fossToggleBtn" title="Show only Free and Open Source Software">
                            🌿 FOSS
                        </button>
                        <select id="optionsSelect" class="options-select">
                            <option value="" hidden selected>⚙️ Options</option>
                            <option value="loadFavorites">✨ My Favorites</option>
                            <option value="importPackages">📥 Import Extensions (JSON)</option>
                            <option value="exportPackages">📤 Export Extensions (JSON)</option>
                        </select>
                        <input id="extensionsSearch" class="search-input" type="search" placeholder="Search by extension name">
                    </div>
                    <input type="file" id="fileInput" accept=".json" style="display: none;">
                </div>

                <div id="extensionsCategories" class="package-container columns"></div>
            </div>
        </section>
    </div>

    <div class="command-footer" id="commandFooter" role="region" aria-label="Extension installation command">
        <div class="command-container">
            <div class="command-output">
                <div class="command-header">
                    <span class="command-language">Install command:</span>
                    <button type="button" class="copy-btn" id="copyCommandBtn" title="Copy to clipboard" aria-label="Copy install command">📋 Copy</button>
                </div>
                <code id="installation-command" aria-live="polite">Select extensions to generate command...</code>
            </div>
        </div>
    </div>
</body>

</html>
