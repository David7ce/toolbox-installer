<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('theme-preference') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <title>VS Code Extensions Table</title>
    <link rel="stylesheet" href="./css/base-styles.css">
    <link rel="stylesheet" href="./css/os-compatibility.css">
    <script type="module" src="./js/modules/theme-manager.js"></script>
    <script type="module" src="./js/modules/packages-table.js"></script>
</head>

<body>
    <div class="container">
        <header class="page-header">
            <h1>🧩 VS Code Extensions Compatibility</h1>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode" title="Dark mode">🌙</button>
        </header>

        <p class="subtitle">Installed extension list and package identifiers for command generation.</p>

        <div class="info-link">
            <a href="./index.html" class="back-link" title="Back to home page">⬅ Back to Home</a>
        </div>

        <div class="info-link">
            <a href="./vscode.html" title="Go to extensions command generator">⚙️ Open Generator</a>
        </div>

        <div class="controls">
            <div class="search-box">
                <input id="tableSearch" type="search" placeholder="Search extension name, package name, or category">
            </div>
        </div>

        <p class="table-meta">Total shown: <strong id="extensionsCount">0</strong></p>

        <div class="table-container">
            <table id="packagesTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Package Name</th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody id="extensionsTableBody"></tbody>
            </table>
        </div>
    </div>
</body>

</html>
